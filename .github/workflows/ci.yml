name: quality

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            functions/yarn.lock

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn --cwd functions install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn test
      - run: yarn build
      - run: yarn --cwd functions build
      - run: yarn test:rules
